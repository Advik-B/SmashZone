# fly.toml app configuration file generated for smashzone on 2026-07-07T14:13:52Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'smashzone'
primary_region = 'ams'
# Give the process time to notify rooms and flush the "restarting" notice
# before Fly hard-kills it on deploy / auto-stop.
kill_timeout = '5s'

# NOTE: rooms live in per-machine memory with no shared registry, so this app
# is correct only on a single machine. Keep max_machines effectively at 1
# (scale up would route friends to different machines → "room not found").

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

  [[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
  memory_mb = 256

