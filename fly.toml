# fly.toml app configuration file generated for smashzone-india on 2026-07-08T18:19:50Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'smashzone-india'
primary_region = 'ams'
kill_timeout = '5s'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
