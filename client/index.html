<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Zoom stays enabled for accessibility. During gameplay the full-screen
      #touch-controls overlay (touch-action: none) already prevents
      pinch/double-tap zoom; on menus the overlay is hidden so text is zoomable.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SmashZone</title>
    <link rel="stylesheet" href="/src/ui/style.css" />
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="ui"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
